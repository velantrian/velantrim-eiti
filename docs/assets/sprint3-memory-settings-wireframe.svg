<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Sprint 3 Memory Settings Wireframe</title>
  <desc id="desc">Dark themed wireframe showing memory lookup toggle, memory mode selector and response pattern buttons for Velantrim EITI settings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16110d"/>
      <stop offset="1" stop-color="#070605"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a211a"/>
      <stop offset="1" stop-color="#14100d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <style>
      .ui { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .muted { fill: #b8a99b; font-size: 20px; }
      .tiny { fill: #9e9184; font-size: 17px; }
      .label { fill: #f4dcc1; font-size: 24px; font-weight: 700; }
      .title { fill: #ffe3b8; font-size: 34px; font-weight: 800; }
      .section { fill: #ffd08a; font-size: 27px; font-weight: 800; }
      .chipText { fill: #f7e4c8; font-size: 19px; font-weight: 650; }
      .chipMuted { fill: #c6b8a8; font-size: 15px; }
      .goldStroke { stroke: #9f7441; stroke-width: 1.4; }
      .dimStroke { stroke: #574536; stroke-width: 1.2; }
      .goldFill { fill: #d7a85e; }
      .panel { fill: url(#card); stroke: #4f3b2d; stroke-width: 1.5; }
      .subpanel { fill: #18120f; stroke: #3b2e25; stroke-width: 1.2; }
      .selected { fill: #3a2b1d; stroke: #d7a85e; stroke-width: 2.2; }
      .unselected { fill: #19130f; stroke: #4a3a2f; stroke-width: 1.4; }
      .toggleOn { fill: #d7a85e; }
      .toggleBg { fill: #3a2b1d; stroke: #d7a85e; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1280" height="900" fill="url(#bg)"/>

  <!-- App shell -->
  <rect x="48" y="42" width="1184" height="816" rx="34" fill="#100c09" stroke="#3c2c20" stroke-width="2" filter="url(#shadow)"/>

  <!-- Sidebar -->
  <rect x="48" y="42" width="230" height="816" rx="34" fill="#0b0907"/>
  <text class="ui title" x="84" y="102">𓆩 EITI 𓆪</text>
  <text class="ui muted" x="84" y="158">Чат</text>
  <text class="ui muted" x="84" y="206">Заметки</text>
  <text class="ui muted" x="84" y="254">Память L3</text>
  <rect x="74" y="286" width="170" height="48" rx="16" fill="#2c2118" stroke="#8d6335"/>
  <text class="ui label" x="99" y="318">Настройки</text>
  <text class="ui tiny" x="84" y="796">v13.7.4 · Sprint 3</text>

  <!-- Main header -->
  <text class="ui title" x="330" y="105">Настройки</text>
  <text class="ui muted" x="330" y="140">Управление памятью, строгостью ответов и паттернами мышления AI</text>

  <!-- Memory card -->
  <rect class="panel" x="318" y="174" width="850" height="286" rx="26"/>
  <text class="ui section" x="350" y="224">🧠 Память ответа</text>
  <text class="ui muted" x="350" y="258">Выбирай, когда системе проверять базу памяти перед ответом.</text>

  <!-- Toggle -->
  <rect class="subpanel" x="350" y="286" width="786" height="64" rx="18"/>
  <text class="ui label" x="374" y="326">Проверять память перед ответом</text>
  <text class="ui tiny" x="374" y="348">OFF = быстрее · ON = точнее, но может быть медленнее</text>
  <rect class="toggleBg" x="1030" y="301" width="82" height="34" rx="17"/>
  <circle class="toggleOn" cx="1094" cy="318" r="13"/>

  <!-- Modes -->
  <g transform="translate(350 374)">
    <rect class="selected" x="0" y="0" width="244" height="62" rx="18"/>
    <text class="ui chipText" x="22" y="28">Normal</text>
    <text class="ui chipMuted" x="22" y="50">быстро, память мягко</text>

    <rect class="unselected" x="270" y="0" width="244" height="62" rx="18"/>
    <text class="ui chipText" x="292" y="28">Grounded</text>
    <text class="ui chipMuted" x="292" y="50">факты + баланс</text>

    <rect class="unselected" x="540" y="0" width="244" height="62" rx="18"/>
    <text class="ui chipText" x="562" y="28">Strict</text>
    <text class="ui chipMuted" x="562" y="50">только validated/L3</text>
  </g>

  <!-- Response patterns card -->
  <rect class="panel" x="318" y="486" width="850" height="298" rx="26"/>
  <text class="ui section" x="350" y="536">💬 Паттерн следующего ответа</text>
  <text class="ui muted" x="350" y="570">Быстро меняет стиль реакции без переписывания запроса.</text>

  <g transform="translate(350 604)">
    <rect class="selected" x="0" y="0" width="230" height="54" rx="17"/>
    <text class="ui chipText" x="22" y="34">Обычный ответ</text>

    <rect class="unselected" x="252" y="0" width="250" height="54" rx="17"/>
    <text class="ui chipText" x="274" y="34">Напиши другую версию</text>

    <rect class="unselected" x="524" y="0" width="260" height="54" rx="17"/>
    <text class="ui chipText" x="546" y="34">Помоги обдумать</text>

    <rect class="unselected" x="0" y="76" width="154" height="54" rx="17"/>
    <text class="ui chipText" x="22" y="110">Коротко</text>

    <rect class="unselected" x="176" y="76" width="210" height="54" rx="17"/>
    <text class="ui chipText" x="198" y="110">Глубокий разбор</text>

    <rect class="unselected" x="408" y="76" width="134" height="54" rx="17"/>
    <text class="ui chipText" x="430" y="110">Критик</text>

    <rect class="unselected" x="564" y="76" width="220" height="54" rx="17"/>
    <text class="ui chipText" x="586" y="110">План действий</text>
  </g>

  <!-- Example assistant bubble -->
  <rect x="820" y="80" width="350" height="68" rx="20" fill="#19120d" stroke="#4a3829"/>
  <text class="ui tiny" x="846" y="111">Пример chip под сообщением:</text>
  <text class="ui chipText" x="846" y="136">↻ другая версия · 🧠 обдумать · ⚑ критик</text>

  <!-- Preview panel -->
  <rect x="780" y="790" width="388" height="38" rx="14" fill="#19120d" stroke="#4a3829"/>
  <text class="ui tiny" x="802" y="815">Состояние: Memory ON · Normal · Обычный ответ</text>
</svg>
