name: Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  js-unit:
    name: JS unit tests (index.html pure logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run Node test runner
        run: node --test velantrim_core/tests_js/*.test.js

  python-core:
    name: Python KB tooling tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: velantrim_core
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        working-directory: velantrim_core
        run: pytest tests/ -v

  e2e-smoke:
    name: Playwright smoke tests (PWA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Playwright + browser
        working-directory: velantrim_core/e2e
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium
      - name: Run smoke tests
        working-directory: velantrim_core/e2e
        run: npx playwright test --reporter=line
